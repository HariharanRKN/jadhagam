# Fly.io: install CLI, then from this directory run: fly launch --no-deploy && fly deploy
# https://fly.io/docs/languages-and-frameworks/docker/

# Must match an app you create once: fly apps create jadhagam
app = "jadhagam"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
