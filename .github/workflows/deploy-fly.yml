# Deploy to Fly.io when you push to main (after one-time Fly + GitHub secret setup).
# Docs: https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
